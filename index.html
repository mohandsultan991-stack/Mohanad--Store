<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHANAD STORE | المتجر الرسمي</title>
    <style>
        :root { --primary: #22c55e; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 100px; }
        header { background: #1e293b; padding: 20px; text-align: center; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        header h1 { color: var(--primary); margin: 0; cursor: pointer; user-select: none; }
        .container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px; }
        .card { background: var(--card); border-radius: 15px; overflow: hidden; border: 1px solid #334155; }
        .card img { width: 100%; height: 300px; object-fit: cover; }
        .btn-add { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; cursor: pointer; font-weight: bold; }
        
        /* لوحة التحكم المخفية */
        #adminPanel { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e293b; padding: 30px; border-radius: 20px; box-shadow: 0 0 50px rgba(0,0,0,0.8); z-index: 2000; width: 90%; max-width: 400px; }
        #adminPanel input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
        
        .checkout-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); padding: 15px; border-radius: 50px; display: none; color: white; font-weight: bold; text-decoration: none; z-index: 1000; }
    </style>
</head>
<body>

<header>
    <h1 id="logo">MOHANAD STORE</h1>
    <div id="cartCount">🛒 0</div>
</header>

<div class="container" id="productsGrid"></div>

<div id="adminPanel">
    <h2 style="color: var(--primary)">لوحة التاجر</h2>
    <input type="text" id="pTitle" placeholder="اسم المنتج">
    <input type="number" id="pPrice" placeholder="السعر">
    <input type="text" id="pImg" placeholder="رابط الصورة">
    <button class="btn-add" onclick="uploadProduct()">إضافة المنتج للمتجر</button>
    <button onclick="document.getElementById('adminPanel').style.display='none'" style="background:none; color:white; border:none; margin-top:10px; cursor:pointer;">إغلاق</button>
</div>

<a href="#" id="whatsappBtn" class="checkout-bar" target="_blank">إتمام الطلب عبر واتساب</a>

<script>
    const dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products.json";
    const myPhone = "201016629202";
    let cart = [];

    // حركة الإخفاء: كلك يمين على اللوجو يفتح اللوحة
    document.getElementById('logo').oncontextmenu = (e) => {
        e.preventDefault();
        document.getElementById('adminPanel').style.display = 'block';
    };

    async function uploadProduct() {
        const product = {
            title: document.getElementById('pTitle').value,
            price: parseInt(document.getElementById('pPrice').value),
            img: document.getElementById('pImg').value
        };
        await fetch(dbURL, { method: 'POST', body: JSON.stringify(product) });
        alert("تمت الإضافة!");
        location.reload();
    }

    async function fetchProducts() {
        const res = await fetch(dbURL);
        const data = await res.json();
        const grid = document.getElementById('productsGrid');
        grid.innerHTML = data ? "" : "<p style='text-align:center; grid-column:1/-1;'>لا توجد منتجات.. افتح لوحة التاجر</p>";
        for (let id in data) {
            const p = data[id];
            grid.innerHTML += `
                <div class="card">
                    <img src="${p.img}">
                    <div style="padding:15px">
                        <h3>${p.title}</h3>
                        <p style="color:var(--primary); font-weight:bold">${p.price} ج.م</p>
                        <button class="btn-add" onclick="addToCart('${p.title}', ${p.price})">إضافة للسلة +</button>
                    </div>
                </div>`;
        }
    }

    function addToCart(t, p) {
        cart.push({t, p});
        document.getElementById('cartCount').innerText = "🛒 " + cart.length;
        const btn = document.getElementById('whatsappBtn');
        btn.style.display = "block";
        let total = cart.reduce((s, i) => s + i.p, 0);
        let msg = encodeURIComponent("طلب جديد:\n" + cart.map(i => `- ${i.t}`).join("\n") + "\nالمجموع: " + total);
        btn.href = `https://wa.me/${myPhone}?text=${msg}`;
    }

    fetchProducts();
</script>
</body>
</html>
