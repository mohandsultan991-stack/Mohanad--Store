<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOHANAD STORE</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #22c55e;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--card-bg);
            margin-bottom: 30px;
        }
        header h1 { margin: 0; color: var(--accent-color); letter-spacing: 2px; }
        .container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            max-width: 1100px;
            margin: 0 auto;
        }
        .product-card {
            background: var(--card-bg);
            border-radius: 20px;
            overflow: hidden;
            transition: 0.3s;
            border: 1px solid #334155;
        }
        .product-image { width: 100%; height: 280px; object-fit: cover; }
        .product-info { padding: 20px; text-align: center; }
        .product-title { font-size: 1.2rem; margin: 10px 0; }
        .product-price { font-size: 1.4rem; font-weight: bold; color: var(--accent-color); margin-bottom: 20px; }
        .whatsapp-btn {
            display: block;
            background-color: var(--accent-color);
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            transition: 0.3s;
        }
        .whatsapp-btn:hover { transform: scale(1.05); background-color: #16a34a; }
    </style>
</head>
<body>

<header>
    <h1>MOHANAD STORE</h1>
    <p>أهلاً بك في متجرك الخاص</p>
</header>

<div class="container" id="productList">
    </div>

<script>
    // لينك قاعدة البيانات الخاص بك
    const dbURL = "https://mohanadstore-2cb02-default-rtdb.firebaseio.com/products.json";

    async function loadProducts() {
        try {
            const response = await fetch(dbURL);
            const data = await response.json();
            const container = document.getElementById('productList');
            container.innerHTML = "";

            for (let id in data) {
                const p = data[id];
                container.innerHTML += `
                    <div class="product-card">
                        <img src="${p.img}" class="product-image" alt="${p.title}">
                        <div class="product-info">
                            <h2 class="product-title">${p.title}</h2>
                            <p class="product-price">${p.price} ج.م</p>
                            <a href="https://wa.me/201016629202?text=أريد طلب: ${p.title} بسعر ${p.price}" 
                               target="_blank" class="whatsapp-btn">
                                اطلب عبر واتساب ✅
                            </a>
                        </div>
                    </div>
                `;
            }
        } catch (error) {
            console.log("خطأ في تحميل المنتجات");
        }
    }

    loadProducts();
</script>

</body>
</html>
